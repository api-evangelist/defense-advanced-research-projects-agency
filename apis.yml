name: Defense Advanced Research Projects Agency
url: >-
  https://raw.githubusercontent.com/api-evangelist/defense-advanced-research-projects-agency/refs/heads/main/apis.yml
description: >-
  Since 1958, DARPA has held to an enduring mission: to create technological
  surprise for U.S. national security. Working with innovators inside and
  outside government, DARPA invests in transformational breakthroughs across
  biological technologies, defense sciences, information innovation,
  microsystems, strategic technology, and tactical technology. DARPA does not
  expose public developer APIs but does publish an RSS news feed and program
  information through its website.
